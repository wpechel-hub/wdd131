<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review</title>
  <meta name="description" content="Submit a detailed product review form including rating, features, and user feedback in a clean and user-friendly interface.">
  <meta name="author" content="Willian Pechel">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>
  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <form method="get" action="review.html" class="review-form">
      <div class="form-group">
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="form-group">
        <legend>Overall Rating</legend>
        <div class="rating-grid">
          <div class="rating-option">
            <label for="rating1">★</label>
            <input type="radio" id="rating1" name="rating" value="1" required>
          </div>
          <div class="rating-option">
            <label for="rating2">★★</label>
            <input type="radio" id="rating2" name="rating" value="2" required>
          </div>
          <div class="rating-option">
            <label for="rating3">★★★</label>
            <input type="radio" id="rating3" name="rating" value="3" required>
          </div>
          <div class="rating-option">
            <label for="rating4">★★★★</label>
            <input type="radio" id="rating4" name="rating" value="4" required>
          </div>
          <div class="rating-option">
            <label for="rating5">★★★★★</label>
            <input type="radio" id="rating5" name="rating" value="5" required>
          </div>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <fieldset class="form-group">
        <legend>Which features did you find useful in the product?<br><span class="hint">Check all that apply</span></legend>
        <div class="checkbox-group">
            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>

            <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
            <label for="easeOfUse">Ease of Use</label>

            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>

            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="writtenReview">Written Review <span class="optional">(Optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="6"></textarea>
      </div>

      <div class="form-group">
        <label for="userName">Your Name <span class="optional">(Optional)</span></label>
        <input type="text" id="userName" name="userName">
      </div>

      <input type="submit" value="Post Review" class="submit-btn">
    </form>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> Willian Pechel | Utah, USA</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
